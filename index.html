<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wedding Seating</title>

  <style>
    :root {
      --background: #3f5133;
      --text: #fbfaf7;
      --accent: #d0ba78;
      --panel: rgba(251, 250, 247, 0.06);
      --panel-strong: rgba(251, 250, 247, 0.12);
      --border: rgba(251, 250, 247, 0.72);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      align-items: start;
      justify-items: center;
      padding: 0 20px 32px;
      background:
        radial-gradient(circle at top, rgba(251, 250, 247, 0.08), transparent 38%),
        var(--background);
    }

    .card {
      width: min(100%, 680px);
      text-align: center;
    }

    form {
      margin-top: 0;
    }

    label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap::before {
      content: "⌕";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.8rem;
      color: var(--text);
      pointer-events: none;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 20px 20px 70px;
      font: inherit;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--text);
      background: var(--panel);
      outline: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    input::placeholder {
      color: rgba(251, 250, 247, 0.62);
    }

    input:focus {
      border-color: var(--text);
      background: var(--panel-strong);
    }

    button {
      display: none;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 16px auto 24px;
      color: var(--accent);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 120px;
      max-width: 28vw;
      height: 1px;
      background: currentColor;
    }

    .divider span {
      font-size: 1.35rem;
      line-height: 1;
    }

    .top-divider {
      margin: 24px auto 28px;
    }

    .result {
      margin-top: 20px;
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      display: none;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .table-name {
      display: block;
      font-size: clamp(3rem, 10vw, 5rem);
      line-height: 1;
      margin-top: 10px;
    }

    .guest-name {
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      line-height: 1.1;
      margin-top: 24px;
    }

    .captain-badge {
      margin-top: 24px;
      padding: 14px 18px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      display: inline-block;
      color: var(--accent);
      font-weight: 700;
    }

    .error strong {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .logo {
      width: min(140px, 40vw);
      height: auto;
      display: block;
      margin: 32px auto 16px;
    }

    .hint {
      margin-top: 28px;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--text);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 520px) {
      body {
        padding-top: 0;
      }

      .result {
        padding: 24px 18px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="divider top-divider" aria-hidden="true"><span>◇</span></div>

    <form id="seatForm">
      <label for="guestName">Your name</label>
      <div class="input-wrap">
        <input id="guestName" type="text" autocomplete="name" placeholder="Type your name" required />
      </div>
      <button type="submit">Search</button>
    </form>

    <div id="result" class="result" aria-live="polite"></div>

    <img class="logo" src="Logo JS transparent.png" alt="JS monogram" />

    <div class="divider" aria-hidden="true"><span>◇</span></div>

    <div class="hint">
      Can’t find your name?<br />Please check the spelling or visit the seating chart.
    </div>
  </main>

  <script>
    const guests = [
      { name: "Joseph Allen", table: "Moraira", captain: true },
      { name: "Simon Lee", table: "Moraira" },
      { name: "Susan Allen", table: "Moraira" },
      { name: "Bridget Eccles", table: "Moraira" }
    ];

    const form = document.getElementById("seatForm");
    const input = document.getElementById("guestName");
    const result = document.getElementById("result");

    function normalise(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, " ");
    }

    function showMessage(html, isError = false) {
      result.innerHTML = html;
      result.className = `result${isError ? " error" : ""}`;
      result.style.display = "block";
    }

    function searchGuest() {
      const searchName = normalise(input.value);

      if (!searchName) {
        result.style.display = "none";
        result.innerHTML = "";
        return;
      }

      const matches = guests.filter((guest) => {
        const guestName = normalise(guest.name);
        return guestName === searchName || guestName.includes(searchName);
      });

      if (matches.length === 1) {
        const guest = matches[0];

        showMessage(`
          <span class="label">Your table</span>
          <span class="table-name">${guest.table}</span>
          <div class="guest-name">${guest.name}</div>

          ${guest.captain ? `
            <div class="captain-badge">
              ★ You are the table captain
            </div>
          ` : ""}
        `);
      } else if (matches.length > 1) {
        showMessage(`
          <strong>We found a few possible matches.</strong>
          Keep typing your full name.<br /><br />
          ${matches.map((guest) => guest.name).join("<br />")}
        `, true);
      } else {
        showMessage(`
          <strong>Sorry, we couldn’t find that name.</strong>
          Please check the spelling, or ask one of the wedding party.
        `, true);
      }
    }

    input.addEventListener("input", searchGuest);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      searchGuest();
    });
  </script>
</body>
</html>
