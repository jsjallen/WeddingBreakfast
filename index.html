<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joe & Simon's Wedding Breakfast</title>
  <style>
    :root {
      --background: #3f5133;
      --text: #fbfaf7;
      --accent: #d0ba78;
      --panel: rgba(251, 250, 247, 0.06);
      --panel-strong: rgba(251, 250, 247, 0.12);
      --border: rgba(251, 250, 247, 0.72);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    * {
      box-sizing: border-box;
    }

    body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  align-items: start;
  justify-items: center;
  padding: 0 20px 32px;
      background:
        radial-gradient(circle at top, rgba(251, 250, 247, 0.08), transparent 38%),
        var(--background);
    }

    .card {
      width: min(100%, 680px);
      text-align: center;
    }

    .logo {
      width: min(170px, 42vw);
      height: auto;
      display: block;
      margin: 0 auto 26px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 5.4rem);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: -0.03em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 34px auto 30px;
      color: var(--accent);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 140px;
      max-width: 28vw;
      height: 1px;
      background: currentColor;
    }

    .divider span {
      font-size: 1.35rem;
      line-height: 1;
    }

    p {
      margin: 0 0 28px;
      font-size: clamp(1.35rem, 4vw, 1.8rem);
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
    }

    label {
      display: block;
      text-align: left;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap::before {
      content: "⌕";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-52%);
      font-size: 2.1rem;
      color: var(--text);
      pointer-events: none;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 22px 22px 90px;
      font: inherit;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--text);
      background: var(--panel);
      outline: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    input::placeholder {
      color: rgba(251, 250, 247, 0.62);
    }

    input:focus {
      border-color: var(--text);
      background: var(--panel-strong);
    }

    button {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .result {
      margin-top: 20px;
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      display: none;
      text-align: left;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .seat-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 28px;
      align-items: center;
      text-align: center;
      margin-bottom: 28px;
    }

    .seat-grid .line {
      width: 1px;
      min-height: 90px;
      background: var(--accent);
      opacity: 0.75;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .number {
      display: block;
      font-size: 3.2rem;
      line-height: 1;
    }

    .guest-name {
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1;
      margin-top: 8px;
    }

    .error {
      text-align: center;
    }

    .error strong {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .hint {
      margin-top: 28px;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--text);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 520px) {
      body {
        padding-top: 24px;
      }

      .result {
        padding: 24px 18px;
      }

      .seat-grid {
        gap: 18px;
      }
    }
  </style>
</head>
<body>

    <h1></h1>

      </div>
      <button type="submit">Search</button>
    </form>

    <div id="result" class="result" aria-live="polite"></div>

    <div class="hint">
      Can’t find your name?<br />Please check the spelling or visit the seating chart.
    </div>
  </main>

    const form = document.getElementById("seatForm");
    const input = document.getElementById("guestName");
    const result = document.getElementById("result");

    function normalise(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, " ");
    }

    function showMessage(html, isError = false) {
      result.innerHTML = html;
      result.className = `result${isError ? " error" : ""}`;
      result.style.display = "block";
    }

    function searchGuest() {
      const searchName = normalise(input.value);

      if (!searchName) {
        result.style.display = "none";
        result.innerHTML = "";
        return;
      }

      const matches = guests.filter((guest) => {
        const guestName = normalise(guest.name);
        return guestName === searchName || guestName.includes(searchName);
      });

      if (matches.length === 1) {
        const guest = matches[0];
        showMessage(`
          <div class="seat-grid">
            <div>
              <span class="label">Table</span>
              <span class="number">${guest.table}</span>
            </div>
            <div class="line" aria-hidden="true"></div>
            <div>
              <span class="label">Seat</span>
              <span class="number">${guest.seat}</span>
            </div>
          </div>
          <div>You’re seated at:</div>
          <div class="guest-name">${guest.name}</div>
        `);
      } else if (matches.length > 1) {
        showMessage(`
          <strong>We found a few possible matches.</strong>
          Keep typing your full name.<br /><br />
          ${matches.map((guest) => guest.name).join("<br />")}
        `, true);
      } else {
        showMessage(`
          <strong>Sorry, we couldn’t find that name.</strong>
          Please check the spelling, or ask one of the wedding party.
        `, true);
      }
    }

    input.addEventListener("input", searchGuest);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      searchGuest();
    });
