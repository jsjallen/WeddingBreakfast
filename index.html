<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wedding Seating</title>

  <style>
    :root {
      --background: #3f5133;
      --text: #fbfaf7;
      --accent: #d0ba78;
      --panel: rgba(251, 250, 247, 0.06);
      --panel-strong: rgba(251, 250, 247, 0.12);
      --border: rgba(251, 250, 247, 0.72);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      align-items: start;
      justify-items: center;
      padding: 0 20px 32px;
      background:
        radial-gradient(circle at top, rgba(251, 250, 247, 0.08), transparent 38%),
        var(--background);
    }

    .card {
      width: min(100%, 680px);
      text-align: center;
    }

    p {
      margin: 32px 0 28px;
      font-size: clamp(1.35rem, 4vw, 1.8rem);
    }

    label {
      display: block;
      text-align: left;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap::before {
      content: "⌕";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.8rem;
      pointer-events: none;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 20px 20px 70px;
      font-size: 1.5rem;
      color: var(--text);
      background: var(--panel);
      outline: none;
    }

    input::placeholder {
      color: rgba(251, 250, 247, 0.6);
    }

    button {
      display: none;
    }

    .logo {
      width: min(140px, 40vw);
      margin: 40px auto 16px;
      display: block;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px auto 24px;
      color: var(--accent);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 120px;
      height: 1px;
      background: currentColor;
    }

    .hint {
      margin-top: 20px;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <main class="card">

    <p>Type your name to find your seat:</p>

    <form id="seatForm">
      <label for="guestName">Your name</label>
      <div class="input-wrap">
        <input id="guestName" type="text" placeholder="e.g. Alex Smith" />
      </div>
      <button type="submit">Search</button>
    </form>

    <!-- moved below -->
    <img class="logo" src="Logo JS transparent.png" alt="JS monogram" />

    <div class="divider"><span>◇</span></div>

    <div id="result"></div>

    <div class="hint">
      Can’t find your name?<br />
      Please check the spelling or visit the seating chart.
    </div>

  </main>

  <script>
    const guests = [
      { name: "Joseph Allen", table: "Moraira", seat: "1" },
      { name: "Simon Lee", table: "Moraira", seat: "2" }
    ];

    const input = document.getElementById("guestName");
    const result = document.getElementById("result");

    function normalise(value) {
      return value.toLowerCase().trim();
    }

    input.addEventListener("input", () => {
      const search = normalise(input.value);

      if (!search) {
        result.innerHTML = "";
        return;
      }

      const match = guests.find(g =>
        normalise(g.name).includes(search)
      );

      if (match) {
        result.innerHTML = `
          <p><strong>${match.name}</strong></p>
          <p>Table: ${match.table} | Seat: ${match.seat}</p>
        `;
      } else {
        result.innerHTML = `<p>No match found</p>`;
      }
    });
  </script>
</body>
</html>
